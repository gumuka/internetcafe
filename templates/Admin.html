<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen bg-[#313647] flex items-center justify-center p-4">
  <div class="bg-white rounded-sm shadow-xl w-full max-w-md p-10 flex flex-col items-center">
    
    <div class="flex flex-col items-center mb-8">
      <div class="bg-black rounded-full p-3 mb-2 text-white">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" viewBox="0 0 24 24" fill="currentColor">

    </div>

           focus:ring-2 focus:ring-[#313647] outline-none placeholder-gray-400"
  />

  <button 
    onclick="window.location.href='AdminHome.html'"
    class="w-full mt-4 bg-[#313647] text-white font-bold py-3 px-4 rounded-sm 
           hover:bg-[#6b62c4] transition-colors uppercase tracking-wide">
    Login
  </button>
</div>

      <div class="flex justify-center pt-5">
        <a href="AdminRegister.html">
        <button class="bg-[#313647] text-white text-sm py-1.5 px-6 rounded-sm hover:bg-[#6b62c4] transition-colors">

        </a>
      </div>
    </div>

  </div>
</div>

</html>
